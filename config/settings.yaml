project:
  name: fx-level-engine
  timezone: UTC
  default_source: fxcm

# Main control center:
# - edit instruments.symbols to decide what gets downloaded, calculated, and exported
# - input/symbols.csv is only a legacy fallback when this list is empty
instruments:
  symbols:
    - EUR/USD
    - GBP/USD
    - USD/JPY
    - USD/CHF
    - AUD/USD
    - USD/CAD
    - NZD/USD
    - EUR/GBP
    - EUR/JPY
    - GBP/JPY
    - EUR/CHF
    - GBP/CHF
    - AUD/JPY
    - CAD/JPY
    - CHF/JPY

fxcm:
  user_env: FXCM_USER
  password_env: FXCM_PASSWORD
  url_env: FXCM_URL
  connection_env: FXCM_CONNECTION
  session_id_env: FXCM_SESSION_ID
  pin_env: FXCM_PIN

storage:
  raw_dir: data/raw/fxcm
  levels_dir: data/levels
  tables_dir: data/tables

history:
  # Fresh market history download settings used by the one-click launcher
  download_timeframes:
    - m30
    - D1
  bars:
    m30: 60000
    D1: 2500

poc:
  source_timeframe: m30
  bucket_mode: fixed_pips
  bucket_size_pips:
    default: 1.0
    JPY: 0.1
  value_area_pct: 0.70
  min_bars_per_profile: 10

ib:
  weekly_anchor: first_day
  monthly_anchor: first_week
  yearly_anchor: first_two_months
  multipliers:
    - 1.5
    - 2.0
    - 3.0
  periods:
    W:
      enabled: false
      include_low_high: true
      include_mid: false
      multipliers: []
    M:
      enabled: true
      include_low_high: true
      include_mid: false
      multipliers: [1.5, 2.0, 3.0]
    Y:
      enabled: true
      include_low_high: true
      include_mid: false
      multipliers: [1.5, 2.0, 3.0]

tables:
  intraday:
    update_frequency: daily
    included_periods: [W, M, Y]
    build_timeframe: M30
  swing:
    update_frequency: weekly
    included_periods: [W, M, Y]
    build_timeframe: H4
  invest:
    update_frequency: biweekly
    included_periods: [W, M, Y]
    build_timeframe: D1

matrix_tables:
  poc_matrix:
    enabled: true
    title: Intraday POC matrix
    source_table_type: intraday
    source_families: [POC]
    source_periods: [W]
    fresh_only: true
    max_levels_per_side: 3
    max_distance_pips:
      default: 1000
      JPY: 2000
    min_side_separation_pips:
      default: 0
      JPY: 0
    confluence:
      enabled: true
      family: IB
      tolerance_pips:
        default: 5
        JPY: 0.5
  ib_matrix:
    enabled: true
    title: Intraday IB matrix
    source_table_type: intraday
    source_families: [IB]
    source_periods: [W]
    fresh_only: true
    max_levels_per_side: 2
    max_distance_pips:
      default: 1000
      JPY: 2000
    min_side_separation_pips:
      default: 0
      JPY: 0
    confluence:
      enabled: true
      family: POC
      tolerance_pips:
        default: 5
        JPY: 0.5
  swing_poc_matrix:
    enabled: true
    title: Swing POC matrix
    source_table_type: swing
    source_families: [POC]
    source_periods: [M]
    fresh_only: true
    max_levels_per_side: 3
    max_distance_pips:
      default: 1000
      JPY: 2000
    min_side_separation_pips:
      default: 0
      JPY: 0
    confluence:
      enabled: true
      family: IB
      tolerance_pips:
        default: 5
        JPY: 0.5
  swing_ib_matrix:
    enabled: true
    title: Swing IB matrix
    source_table_type: swing
    source_families: [IB]
    source_periods: [M]
    fresh_only: true
    max_levels_per_side: 2
    max_distance_pips:
      default: 1000
      JPY: 2000
    min_side_separation_pips:
      default: 0
      JPY: 0
    confluence:
      enabled: true
      family: POC
      tolerance_pips:
        default: 5
        JPY: 0.5
  invest_poc_matrix:
    enabled: true
    title: Invest POC matrix
    source_table_type: invest
    source_families: [POC]
    source_periods: [Y]
    fresh_only: true
    max_levels_per_side: 3
    max_distance_pips:
      default: 1000
      JPY: 2000
    min_side_separation_pips:
      default: 0
      JPY: 0
    confluence:
      enabled: true
      family: IB
      tolerance_pips:
        default: 5
        JPY: 0.5
  invest_ib_matrix:
    enabled: true
    title: Invest IB matrix
    source_table_type: invest
    source_families: [IB]
    source_periods: [Y]
    fresh_only: true
    max_levels_per_side: 2
    max_distance_pips:
      default: 1000
      JPY: 2000
    min_side_separation_pips:
      default: 0
      JPY: 0
    confluence:
      enabled: true
      family: POC
      tolerance_pips:
        default: 5
        JPY: 0.5

# Economic Calendar Agent Configuration
economic_calendar:
  enabled: true   # Primary source is Trading Economics live calendar scraping
  sources:
    - trading_economics
    # - forex_factory      # Legacy fallback
  cache_ttl_hours: 4
  
  # Trading restrictions during economic events
  trading_restrictions:
    enabled: true
    # Quiet period (minutes before and after event)
    quiet_minutes: 30
    # Minimum importance to block trading: "low", "medium", "high"
    importance_threshold: medium
    
  # Which symbols to monitor
  # If empty, monitors all symbols in pipeline
  monitor_symbols: []
  
  # Optional API key for Trading Economics API
  trading_economics_api_key_env: TRADING_ECONOMICS_API_KEY
